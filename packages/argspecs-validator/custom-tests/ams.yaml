# Custom tests for ams package commands/environments that require specific context.

commands:
  shoveleft:
    skip_ofat: true
    cases:
      - branch: "ctx:in-multline"
        tex: "\\begin{multline} a \\\\ \\shoveleft{b} \\\\ c \\end{multline}"
        expect:
          mathjax: pass
          katex: fail
          xetex: fail

  shoveright:
    skip_ofat: true
    cases:
      - branch: "ctx:in-multline"
        tex: "\\begin{multline} a \\\\ \\shoveright{b} \\\\ c \\end{multline}"
        expect:
          mathjax: pass
          katex: fail
          xetex: fail

  sideset:
    skip_ofat: true
    cases:
      - branch: "ctx:with-sum"
        tex: "\\sideset{_a}{^b}\\sum"
        expect: pass
      - branch: "ctx:with-prod"
        tex: "\\sideset{_1^2}{_3^4}\\prod_{n=1}^{\\infty}"
        expect: pass

  tag:
    skip_ofat: true
    cases:
      - branch: "ctx:in-equation"
        tex: "\\begin{equation} a = b \\tag{1} \\end{equation}"
        expect:
          mathjax: pass
          katex: fail
          xetex: fail
      - branch: "ctx:star-in-equation"
        tex: "\\begin{equation} a = b \\tag*{eq1} \\end{equation}"
        expect:
          mathjax: pass
          katex: fail
          xetex: fail

environments:
  gather:
    skip_ofat: true
    cases:
      - branch: "ctx:no-ampersand"
        tex: "\\begin{gather} a \\\\ b \\end{gather}"
        expect: pass

  "gather*":
    skip_ofat: true
    cases:
      - branch: "ctx:no-ampersand"
        tex: "\\begin{gather*} a \\\\ b \\end{gather*}"
        expect: pass

  gathered:
    skip_ofat: true
    cases:
      - branch: "ctx:basic"
        tex: "\\begin{gathered} a \\\\ b \\end{gathered}"
        expect: pass
      - branch: "ctx:with-pos"
        tex: "\\begin{gathered}[b] a \\\\ b \\end{gathered}"
        expect: pass

  split:
    skip_ofat: true
    cases:
      - branch: "ctx:in-equation"
        tex: "\\begin{equation} \\begin{split} a &= b \\\\ &= c \\end{split} \\end{equation}"
        expect:
          mathjax: pass
          katex: fail
          xetex: fail

  subarray:
    skip_ofat: true
    cases:
      - branch: "ctx:in-subscript"
        tex: "\\sum_{\\begin{subarray}{l} i \\in A \\\\ j \\in B \\end{subarray}}"
        expect: pass
