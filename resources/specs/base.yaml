characters:
  - alpha
  - beta
  - gamma
  # ... more character commands ...

commands:
  # Prefix commands
  - name: frac
    kind: prefix
    has_star_variant: false
    args:
      - required: true
        kind: math
      - required: true
        kind: math

  - name: sqrt
    kind: prefix
    has_star_variant: false
    args:
      - required: false
        kind: math
      - required: true
        kind: math

  - name: text
    kind: prefix
    has_star_variant: false
    args:
      - required: true
        kind: text

  - name: delim
    kind: prefix
    has_star_variant: false
    args:
      - required: true
        kind: delimiter

  - name: hspace
    kind: prefix
    has_star_variant: false
    args:
      - required: true
        kind: dimension

  - name: romannumeral
    kind: prefix
    has_star_variant: false
    args:
      - required: true
        kind: integer

  - name: includegraphics
    kind: prefix
    has_star_variant: false
    args:
      - required: false
        kind: keyval
      - required: true
        kind: text

  # Infix commands
  - name: over
    kind: infix
    has_star_variant: false
    args: []

  - name: choose
    kind: infix
    has_star_variant: false
    args: []

  # Declarative commands
  - name: bfseries
    kind: declarative
    has_star_variant: false
    args: []

  - name: color
    kind: declarative
    has_star_variant: false
    args:
      - required: true
        kind: text

environments:
  - name: matrix
    has_star_variant: false
    args: []
    body_mode: math

  - name: align
    has_star_variant: true
    args: []
    body_mode: math

delimiter_controls:
  - langle
  - rangle
  - "{"
  - "}"
  - lfloor
  - rfloor
  - lceil
  - rceil
  - lvert
  - rvert
  - lVert
  - rVert
  - lgroup
  - rgroup
  - lmoustache
  - rmoustache
