commands:
  # Prefix commands
  - name: frac
    kind: prefix
    has_star_variant: false
    args:
      - kind: mandatory
        mode: math
      - kind: mandatory
        mode: math

  - name: sqrt
    kind: prefix
    has_star_variant: false
    args:
      - kind: optional
        mode: math
      - kind: mandatory
        mode: math

  - name: text
    kind: prefix
    has_star_variant: false
    args:
      - kind: mandatory
        mode: text

  # Infix commands
  - name: over
    kind: infix
    has_star_variant: false
    args: []

  - name: choose
    kind: infix
    has_star_variant: false
    args: []

  # Declarative commands
  - name: bfseries
    kind: declarative
    has_star_variant: false
    args: []

  - name: color
    kind: declarative
    has_star_variant: false
    args:
      - kind: mandatory
        mode: text

