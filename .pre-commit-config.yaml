fail_fast: true

repos:
  # - repo: https://github.com/crate-ci/typos
  #   rev: v1.40.0
  #   hooks:
  #     - id: typos

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --
        language: system
        types: [rust]
        pass_filenames: false # This makes it a lot faster

      - id: cargo-clippy
        name: cargo clippy
        language: system
        types: [rust]
        pass_filenames: false
        entry: cargo clippy --all-targets --all-features

      - id: parser-regression-check
        name: parser regression check
        language: system
        types: [rust]
        pass_filenames: false
        entry: cargo run --release -p texform-regression --bin parser_regression -- --dataset lf80m-benchmarks --check
