name: release-plz

on:
  push:
    branches: [main]
    # Keeps the release PR up to date; only the release-pr job runs here.
  pull_request:
    types: [closed]
    branches: [main]
    # A merged release PR fires the release job. The event payload carries the
    # head branch and the merge commit directly, so the gate needs no
    # commit->PR lookup and cannot race the API that backs it.
  workflow_dispatch:
    # Manual release entry: bootstrap and binding/wrapper-only releases.

concurrency:
  # Separate groups for the two intents: push runs only release-pr, while a
  # merged release PR or a dispatch runs only release, and the two jobs do not
  # conflict. Sharing one group would be harmful — a concurrency group keeps at
  # most one pending run, so a push to main queued behind an in-flight run
  # could silently cancel a pending release run.
  group: release-plz-${{ github.event_name == 'push' && 'pr' || 'release' }}
  cancel-in-progress: false

jobs:
  release-pr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PR_TOKEN }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz release-pr
        id: release-pr
        uses: release-plz/action@d22c02a7cf6d7870bd163be7c7d9518d331aef34 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
      - name: Sync npm package version into release PR
        if: steps.release-pr.outputs.prs_created == 'true'
        env:
          PR_JSON: ${{ steps.release-pr.outputs.pr }}
        run: |
          branch=$(echo "$PR_JSON" | jq -r '.head_branch')
          git fetch origin "$branch"
          git checkout "$branch"
          node .github/scripts/sync-versions.mjs
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: sync npm package version"
            git push origin "$branch"
          fi
      - name: Warn on binding or wrapper drift
        # release-plz change detection is based on cargo package files; the
        # publish=false binding crates and wrapper directories do not trigger a
        # release PR by themselves. This warning is the alert path; releases for
        # such changes go through the manual dispatch entry (see RELEASING.md).
        run: |
          last_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$last_tag" ]; then exit 0; fi
          git checkout "${{ github.sha }}" --quiet
          if ! git diff --quiet "$last_tag"..HEAD -- crates/texform-python/ crates/texform-wasm/ python/ packages/texform/; then
            echo "::warning::binding or wrapper files changed since $last_tag. If no release PR reflects this, release manually (RELEASING.md)."
          fi

  release:
    # Run only for a merged release-plz PR (payload-driven, so it cannot race
    # the commit->PR association API) or an explicit manual dispatch. The `if`
    # is evaluated before the job starts, so a non-release event never enters
    # the release environment.
    if: >-
      vars.RELEASE_ENABLED == 'true' && (
        github.event_name == 'workflow_dispatch' ||
        (github.event.pull_request.merged == true &&
         github.event.pull_request.head.repo.full_name == github.repository &&
         startsWith(github.event.pull_request.head.ref, 'release-plz-'))
      )
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    env:
      BOOTSTRAP_CARGO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          # On a pull_request event github.sha is a synthetic merge ref, so
          # check out the PR's real merge/squash commit on main; fall back to
          # github.sha for a workflow_dispatch run.
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          # The tag must be pushed with a PAT: tags pushed with the default
          # GITHUB_TOKEN do not trigger the release.yml workflow.
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Attach release commit to main
        # Checking out an exact commit leaves HEAD detached, but release-plz
        # needs the current branch and its upstream to resolve the release PR.
        run: |
          git switch -C main HEAD
          git branch --set-upstream-to=origin/main main
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Enable release for this gated run
        # With release_always = false, release-plz itself re-checks whether
        # HEAD came from a release PR via the commit->PR association API — the
        # same racy lookup this workflow's gate used to depend on. Both entry
        # points are already validated by the job-level `if`, so flip the flag
        # unconditionally here; release-plz stays idempotent for versions that
        # are already published.
        run: sed -i 's/^release_always = false/release_always = true/' release-plz.toml
      - name: Obtain crates.io OIDC token
        id: oidc
        if: env.BOOTSTRAP_CARGO_TOKEN == ''
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1
      - name: Run release-plz release
        uses: release-plz/action@d22c02a7cf6d7870bd163be7c7d9518d331aef34 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.oidc.outputs.token }}
