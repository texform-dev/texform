name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
      - name: Parser regression verify
        run: cargo run --release -p texform-regression --bin parser_regression -- verify --dataset lf80m-benchmarks

  python-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          manylinux: auto
      - name: Smoke test wheel
        run: |
          pip install texform --no-index --find-links dist
          python -c 'import texform; texform.Parser(); print("texform ok")'

  npm-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build wasm package
        working-directory: packages/texform
        run: bun run prepare:publish
      - name: Typecheck
        working-directory: packages/texform
        run: bun run check
      - name: Smoke test
        working-directory: packages/texform
        run: bun run smoke:node
