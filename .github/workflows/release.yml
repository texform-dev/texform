name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    # Dispatch runs are always dry runs: full build + smoke, no publish.

permissions:
  contents: read

env:
  PY_SMOKE: 'import texform; texform.Parser(); print("texform ok")'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check version consistency
        env:
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: node .github/scripts/check-versions.mjs

  build-wheels:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: auto
            smoke: native
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64
            manylinux: auto
            smoke: qemu-arm64
          - name: musllinux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
            smoke: alpine
          - name: macos-aarch64
            os: macos-latest
            target: aarch64
            manylinux: ""
            smoke: native
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64
            manylinux: ""
            smoke: native
          - name: windows-x64
            os: windows-latest
            target: x64
            manylinux: ""
            smoke: native
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}
      - name: Smoke test (native)
        if: matrix.smoke == 'native'
        shell: bash
        run: |
          pip install texform --no-index --find-links dist
          python -c "$PY_SMOKE"
      - name: Smoke test (qemu arm64)
        if: matrix.smoke == 'qemu-arm64'
        run: |
          docker run --rm --privileged tonistiigi/binfmt --install arm64
          docker run --rm --platform linux/arm64 -v "$PWD/dist:/dist" python:3.12-bookworm \
            sh -c "pip install texform --no-index --find-links /dist && python -c '$PY_SMOKE'"
      - name: Smoke test (alpine musl)
        if: matrix.smoke == 'alpine'
        run: |
          docker run --rm -v "$PWD/dist:/dist" python:3.12-alpine \
            sh -c "pip install texform --no-index --find-links /dist && python -c '$PY_SMOKE'"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.name }}
          path: dist

  build-sdist:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Smoke test sdist (build from source)
        run: |
          pip install dist/*.tar.gz
          python -c "$PY_SMOKE"
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  build-npm:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
          fallback: none
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build wasm package (node + web targets)
        working-directory: packages/texform
        run: bun run prepare:publish
      - name: Typecheck and smoke test
        working-directory: packages/texform
        run: |
          bun run check
          bun run smoke:node
      - name: Pack
        working-directory: packages/texform
        run: npm pack
      - uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: packages/texform/*.tgz

  publish-pypi:
    needs: [build-wheels, build-sdist]
    if: github.ref_type == 'tag' && vars.RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-npm:
    needs: build-npm
    if: github.ref_type == 'tag' && vars.RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest && npm --version
      - uses: actions/download-artifact@v8
        with:
          name: npm-package
      - name: Publish (skip if version already exists)
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "texform@${version}" version >/dev/null 2>&1; then
            echo "texform@${version} already published, skipping"
            exit 0
          fi
          # Bootstrap dual path: use the token secret when present (first
          # release), otherwise rely on OIDC trusted publishing.
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm config set "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN"
          fi
          npm publish "texform-${version}.tgz" --access public

  attach-assets:
    needs: [publish-pypi, publish-npm]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: assets
          merge-multiple: true
      - name: Upload assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" assets/* --clobber
