name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    # Dispatch runs are always dry runs: full build + smoke, no publish.

permissions:
  contents: read

env:
  PY_SMOKE: 'import texform; texform.Parser(); print("texform ok")'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Check version consistency
        env:
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: node .github/scripts/check-versions.mjs

  build-wheels:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: auto
            smoke: native
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64
            manylinux: auto
            smoke: qemu-arm64
          - name: musllinux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
            smoke: alpine
          - name: macos-aarch64
            os: macos-latest
            target: aarch64
            manylinux: ""
            smoke: native
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64
            manylinux: ""
            smoke: native
          - name: windows-x64
            os: windows-latest
            target: x64
            manylinux: ""
            smoke: native
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@423a6347767a8b16e65c2a7a7042e4a921528da8 # v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}
      - name: Smoke test (native)
        if: matrix.smoke == 'native'
        shell: bash
        run: |
          pip install texform --no-index --find-links dist
          python -c "$PY_SMOKE"
      - name: Smoke test (qemu arm64)
        if: matrix.smoke == 'qemu-arm64'
        run: |
          docker run --rm --privileged tonistiigi/binfmt:latest@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0 --install arm64
          docker run --rm --platform linux/arm64 -v "$PWD/dist:/dist:ro" python:3.12-bookworm@sha256:218a88a57964084b18fe70190b9d5cc6543b24126c3206c3d3e707db8e0c3c25 \
            sh -c "pip install texform --no-index --find-links /dist && python -c '$PY_SMOKE'"
      - name: Smoke test (alpine musl)
        if: matrix.smoke == 'alpine'
        run: |
          docker run --rm -v "$PWD/dist:/dist:ro" python:3.12-alpine@sha256:dbb1970cc04ce7d381c65efe8309c0c03d463e5b35c88f14d721796ad24cfbfd \
            sh -c "pip install texform --no-index --find-links /dist && python -c '$PY_SMOKE'"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-${{ matrix.name }}
          path: dist

  build-sdist:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: PyO3/maturin-action@423a6347767a8b16e65c2a7a7042e4a921528da8 # v1
        with:
          command: sdist
          args: --out dist
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Smoke test sdist (build from source)
        run: |
          pip install dist/*.tar.gz
          python -c "$PY_SMOKE"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist
          path: dist

  build-npm:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: wasm-pack@0.15.0
          fallback: none
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - name: Build wasm package (node + web targets)
        working-directory: packages/texform
        run: bun run prepare:publish
      - name: Typecheck and smoke test
        working-directory: packages/texform
        run: |
          bun run check
          bun run smoke:node
      - name: Pack
        working-directory: packages/texform
        run: npm pack
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-package
          path: packages/texform/*.tgz

  publish-pypi:
    needs: [build-wheels, build-sdist]
    if: github.ref_type == 'tag' && vars.RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  publish-npm:
    needs: build-npm
    if: github.ref_type == 'tag' && vars.RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-package
      - name: Publish (skip if version already exists)
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "texform@${version}" version >/dev/null 2>&1; then
            echo "texform@${version} already published, skipping"
            exit 0
          fi
          # Bootstrap dual path: use the token secret when present (first
          # release), otherwise rely on OIDC trusted publishing.
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm config set "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN"
          fi
          npm publish "texform-${version}.tgz" --access public

  attach-assets:
    needs: [publish-pypi, publish-npm]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: assets
          merge-multiple: true
      - name: Upload assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" assets/* --clobber
